# docker-compose.yml — Stack AHP-MCE FOLUR Luwu
# Layanan: db (PostgreSQL) · backend (Django/DRF) · frontend (nginx + statis Tailwind)

services:
  db:
    image: postgres:16-alpine
    container_name: ahp_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ahp_mce}
      POSTGRES_USER: ${POSTGRES_USER:-ahp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ahp_password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ahp} -d ${POSTGRES_DB:-ahp_mce}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: ahp_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-insecure-change-me}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-0}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      POSTGRES_DB: ${POSTGRES_DB:-ahp_mce}
      POSTGRES_USER: ${POSTGRES_USER:-ahp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ahp_password}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:8080}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: ahp_frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    restart: unless-stopped

volumes:
  pgdata:
